        :root { --bg: #ffffff; --card: #ffffff; --text: #111827; --text-muted: #6b7280; --primary: #111827; --primary-hover: #374151; --error: #ef4444; }
body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; box-sizing: border-box; }
.container { background: var(--card); padding: 2.5rem 2rem; border-radius: 12px; box-shadow: 0 20px 40px -4px rgba(0,0,0,0.08), 0 8px 16px -4px rgba(0,0,0,0.04); text-align: center; max-width: 400px; width: 100%; border: 1px solid rgba(0, 0, 0, 0.04); }
.icon { width: 48px; height: 48px; margin: 0 auto 1.5rem; color: var(--text); }
h2 { margin: 0 0 0.5rem; font-size: 1.5rem; font-weight: 600; }
p { margin: 0 0 1.5rem; color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

/* Custom styles for document selection */
.doc-selection { text-align: left; margin-bottom: 1.5rem; max-height: 180px; overflow-y: auto; background: var(--bg); padding: 0.5rem; border-radius: 8px; border: 1px solid rgba(0, 0, 0, 0.1); display: none; }
.doc-label { display: flex; align-items: center; padding: 0.75rem; cursor: pointer; border-radius: 6px; margin-bottom: 0.25rem; transition: background 0.2s; font-size: 0.95rem; }
.doc-label:last-child { margin-bottom: 0; }
.doc-label input[type="radio"] { margin: 0 0.75rem 0 0; width: auto; padding: 0; cursor: pointer; accent-color: var(--primary); }
.doc-label.selected { background: rgba(0, 0, 0, 0.04); font-weight: 500; color: var(--text); }

input[type="password"] { width: 100%; padding: 0.875rem; margin-bottom: 1rem; background: var(--bg); color: var(--text); border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 6px; box-sizing: border-box; font-size: 1rem; outline: none; transition: all 0.2s; }
input[type="password"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05); }
button { background: var(--primary); color: white; border: 1px solid var(--primary); padding: 0.875rem; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; width: 100%; transition: all 0.2s; }
button:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }
button:disabled { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; cursor: not-allowed; }
.error { color: var(--error); margin-top: 1rem; font-size: 0.9rem; display: none; }

.shield-path { stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        const originalBtnText = "Submit / Acceder";
        let documents = [];

        function base64ToBuffer(base64) {
            const binary = window.atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }

        // Initialization logic for multiple documents
        function init() {
            try {
                const payloadBytes = base64ToBuffer(payloadB64);
                const payloadStr = new TextDecoder().decode(payloadBytes);
                documents = JSON.parse(payloadStr);

                const selectionContainer = document.getElementById('selection-container');
                const unlockBtn = document.getElementById('unlock-btn');
                
                if (documents.length > 1) {
                    selectionContainer.style.display = 'block';
                    unlockBtn.disabled = true; // Disable until a radio is selected
                    
                    documents.forEach((doc, index) => {
                        const label = document.createElement('label');
                        label.className = 'doc-label';
                        
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = 'docSelection';
                        radio.value = index;
                        
                        radio.addEventListener('change', () => {
                            document.querySelectorAll('.doc-label').forEach(l => l.classList.remove('selected'));
                            if(radio.checked) {
                                label.classList.add('selected');
                                unlockBtn.disabled = false; // Enable when selected
                            }
                        });
                        
                        const text = document.createTextNode(doc.name || 'Untitled Document');
                        
                        label.appendChild(radio);
                        label.appendChild(text);
                        selectionContainer.appendChild(label);
                    });
                }
            } catch (e) {
                console.error("Failed to parse document payload", e);
            }
        }

        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                "PBKDF2",
                false,
                ["deriveBits", "deriveKey"]
            );
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );
        }

        async function decrypt() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('unlock-btn');

            if (!password) return;

            // Determine which document to decrypt
            let selectedIndex = 0;
            if (documents.length > 1) {
                const selectedRadio = document.querySelector('input[name="docSelection"]:checked');
                if (!selectedRadio) {
                    errorMsg.textContent = "Please select a document first.";
                    errorMsg.style.display = 'block';
                    return;
                }
                selectedIndex = parseInt(selectedRadio.value, 10);
            }

            btn.textContent = 'Decrypting...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const salt = base64ToBuffer(saltB64);
                const key = await deriveKey(password, salt);

                const selectedDoc = documents[selectedIndex];
                const iv = base64ToBuffer(selectedDoc.iv);
                const ciphertext = base64ToBuffer(selectedDoc.ciphertext);

                const decryptedBuffer = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    key,
                    ciphertext
                );

                const dec = new TextDecoder();
                const decryptedHtml = dec.decode(decryptedBuffer);

                document.open();
                document.write(decryptedHtml);
                document.close();
            } catch (e) {
                console.error("Decryption failed:", e);
                errorMsg.textContent = "Incorrect password. Please try again.";
                errorMsg.style.display = 'block';
                btn.textContent = originalBtnText;
                btn.disabled = false;
                
                const container = document.getElementById('auth-box');
                container.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 400, iterations: 1 });
            }
        }

        document.getElementById('unlock-btn').addEventListener('click', decrypt);
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') decrypt();
        });

        // Initialize the UI
        init();
    </script>
